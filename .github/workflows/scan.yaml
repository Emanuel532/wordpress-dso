name: DevSecOps Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start and Scan
        continue-on-error: true
        env:
          WPSCAN_TOKEN: ${{ secrets.WPSCAN_TOKEN }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_ROOT_PASS: ${{ secrets.DB_ROOT_PASS }}
        run: docker compose --profile CI up --wait --build

      - name: Archive Scan Report
        if: always() # Archive even if vulnerabilities are found
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-report
          path: reports/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to Docker Hub
        env:
          WPSCAN_TOKEN: ${{ secrets.WPSCAN_TOKEN }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_ROOT_PASS: ${{ secrets.DB_ROOT_PASS }}
        run: docker compose build --push wordpress

      - name: Tag and Push to GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          GHCR_TAG="ghcr.io/${OWNER}/wordpress-dso:latest"
          
          docker tag emanu11/wordpress-dso:latest $GHCR_TAG
          docker push $GHCR_TAG