name: DevSecOps Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start and Scan
        env:
          WPSCAN_TOKEN: ${{ secrets.WPSCAN_TOKEN }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_ROOT_PASS: ${{ secrets.DB_ROOT_PASS }}
        run: docker compose --profile CI up --wait --build

      - name: Archive Scan Report
        if: always() # archive on failure as well
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-report
          path: reports/